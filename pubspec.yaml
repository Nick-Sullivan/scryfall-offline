name: scryfall_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  cached_network_image: ^3.4.1
  drift: ^2.30.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  http: ^1.6.0
  mana_icons_flutter: ^1.18.0
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  petitparser: ^7.0.2
  shared_preferences: ^2.5.3
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.42
  url_launcher: ^6.3.2
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Source art is rendered by test/tool/render_icon_test.dart (RENDER_APP_ICON=1);
# regenerate launcher icons with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: assets/icon/icon_background.png
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  adaptive_icon_monochrome: assets/icon/icon_monochrome.png
