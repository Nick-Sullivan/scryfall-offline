name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FLUTTER_VERSION: 3.32.8

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # Desktop test runs need a system SQLite with FTS5 (Ubuntu's has it).
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: flutter pub get
      - run: flutter analyze --no-pub
      - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug

  # The dev machine is Windows, which cannot build iOS at all — this job is
  # the only thing keeping the iOS target compiling until an Apple Developer
  # account exists. Non-blocking by design.
  build-ios:
    runs-on: macos-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign
