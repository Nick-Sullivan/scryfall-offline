name: Release to Google Play (internal track)

on:
  push:
    tags: ['v*']

env:
  FLUTTER_VERSION: 3.32.8
  # Keeps versionCode monotonic across workflow re-runs and repo moves;
  # bump this base if run numbers ever reset.
  VERSION_CODE_BASE: 1000

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$((VERSION_CODE_BASE + GITHUB_RUN_NUMBER))
          echo "Building $VERSION ($BUILD_NUMBER)"
          flutter pub get
          flutter build appbundle --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER"

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Play internal testing track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nicksullivan.scryfall_app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
